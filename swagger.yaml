openapi: 3.0.0
info:
  title: Ozinse API
  version: 1.0.0
  description: Полная документация API для проекта Ozinse.
servers:
  - url: http://localhost:8080/api/v1
    description: Локальный сервер

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Введите ваш JWT токен

tags:
  - name: Auth
    description: Авторизация и безопасность
  - name: Public
    description: Публичные данные (Проекты, Категории, Жанры)
  - name: Profile
    description: Управление профилем пользователя
  - name: Favorites
    description: Избранный контент
  - name: Admin (References)
    description: Управление справочниками (Категории, Жанры, Рейтинги)
  - name: Admin (Projects)
    description: Управление контентом (Проекты, Сезоны, Эпизоды)
  - name: Admin (Users)
    description: Управление пользователями и ролями

paths:
  # ================= AUTH =================
  /auth/register:
    post:
      tags: [Auth]
      summary: Регистрация нового пользователя
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "user@ozinse.com" }
                password: { type: string, example: "secret123" }
                full_name: { type: string, example: "Азамат" }
      responses:
        '200': { description: "Успешная регистрация" }

  /auth/login:
    post:
      tags: [Auth]
      summary: Вход в систему
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string, example: "user@ozinse.com" }
                password: { type: string, example: "secret123" }
      responses:
        '200': { description: "Возвращает access_token и refresh_token" }

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Обновление access токена
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refresh_token: { type: string }
      responses:
        '200': { description: "Новые токены" }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Сброс пароля
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
      responses:
        '200': { description: "Инструкция отправлена" }

  # ================= PUBLIC PROJECTS =================
  /projects:
    get:
      tags: [Public]
      summary: Получить список всех проектов
      responses:
        '200': { description: "Список проектов" }

  /projects/featured:
    get:
      tags: [Public]
      summary: Получить рекомендованные проекты (главная)
      responses:
        '200': { description: "Список рекомендованных" }

  /projects/{id}:
    get:
      tags: [Public]
      summary: Получить информацию о проекте
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Детали проекта" }

  /projects/{id}/seasons:
    get:
      tags: [Public]
      summary: Получить список сезонов проекта
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Список сезонов и эпизодов" }

  # ================= REFERENCES (PUBLIC) =================
  /categories:
    get:
      tags: [Public]
      summary: Получить все категории
      responses:
        '200': { description: "Список" }

  /genres:
    get:
      tags: [Public]
      summary: Получить все жанры
      responses:
        '200': { description: "Список" }

  /age-ratings:
    get:
      tags: [Public]
      summary: Получить все возрастные рейтинги
      responses:
        '200': { description: "Список" }

  # ================= PROFILE =================
  /profile/me:
    get:
      tags: [Profile]
      summary: Получить данные пользователя
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Данные профиля" }
    put:
      tags: [Profile]
      summary: Обновить данные профиля
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                avatar_url: { type: string }
      responses:
        '200': { description: "Обновлено" }

  /profile/password:
    put:
      tags: [Profile]
      summary: Изменить пароль
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                old_password: { type: string }
                new_password: { type: string }
      responses:
        '200': { description: "Пароль изменен" }

  # ================= FAVORITES =================
  /favorites:
    get:
      tags: [Favorites]
      summary: Получить список избранного
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Список избранных" }

  /favorites/{project_id}:
    post:
      tags: [Favorites]
      summary: Добавить в избранное
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Добавлено" }
    delete:
      tags: [Favorites]
      summary: Удалить из избранного
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: project_id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  # ================= ADMIN: UPLOAD =================
  /admin/upload:
    post:
      tags: [Admin (Projects)]
      summary: Загрузка файла
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200': { description: "URL файла" }

  # ================= ADMIN: CATEGORIES =================
  /admin/categories:
    post:
      tags: [Admin (References)]
      summary: Создать категорию
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: "Создано" }

  /admin/categories/{id}:
    put:
      tags: [Admin (References)]
      summary: Обновить категорию
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: "Обновлено" }
    delete:
      tags: [Admin (References)]
      summary: Удалить категорию
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  # ================= ADMIN: GENRES =================
  /admin/genres:
    post:
      tags: [Admin (References)]
      summary: Создать жанр
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: "Создано" }

  /admin/genres/{id}:
    put:
      tags: [Admin (References)]
      summary: Обновить жанр
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200': { description: "Обновлено" }
    delete:
      tags: [Admin (References)]
      summary: Удалить жанр
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  # ================= ADMIN: AGE RATINGS =================
  /admin/age-ratings:
    post:
      tags: [Admin (References)]
      summary: Создать возрастной рейтинг
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "18+" }
      responses:
        '200': { description: "Создано" }

  /admin/age-ratings/{id}:
    put:
      tags: [Admin (References)]
      summary: Обновить возрастной рейтинг
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Обновлено" }
    delete:
      tags: [Admin (References)]
      summary: Удалить возрастной рейтинг
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  # ================= ADMIN: USERS & ROLES =================
  /admin/users:
    get:
      tags: [Admin (Users)]
      summary: Получить список пользователей
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Список" }

  /admin/users/{user_id}/assign-role:
    post:
      tags: [Admin (Users)]
      summary: Назначить роль пользователю
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role_id: { type: integer }
      responses:
        '200': { description: "Роль назначена" }

  /admin/roles:
    get:
      tags: [Admin (Users)]
      summary: Получить список ролей
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Список ролей" }
    post:
      tags: [Admin (Users)]
      summary: Создать роль
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "MODERATOR" }
      responses:
        '200': { description: "Роль создана" }

  /admin/roles/{id}:
    put:
      tags: [Admin (Users)]
      summary: Обновить роль
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Обновлено" }
    delete:
      tags: [Admin (Users)]
      summary: Удалить роль
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  # ================= ADMIN: PROJECTS =================
  /admin/projects:
    get:
      tags: [Admin (Projects)]
      summary: Получить все проекты (для админки)
      security: [{ BearerAuth: [] }]
      responses:
        '200': { description: "Список проектов" }
    post:
      tags: [Admin (Projects)]
      summary: Создать проект
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                category_id: { type: integer }
      responses:
        '200': { description: "Проект создан" }

  /admin/projects/{id}:
    put:
      tags: [Admin (Projects)]
      summary: Обновить проект
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Обновлено" }
    delete:
      tags: [Admin (Projects)]
      summary: Удалить проект
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200': { description: "Удалено" }

  /admin/projects/featured-order:
    put:
      tags: [Admin (Projects)]
      summary: Обновить порядок избранных проектов
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                project_ids: 
                  type: array
                  items: { type: integer }
      responses:
        '200': { description: "Порядок обновлен" }

  /admin/projects/{id}/seasons:
    post:
      tags: [Admin (Projects)]
      summary: Создать сезон для проекта
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                season_number: { type: integer }
                title: { type: string }
      responses:
        '200': { description: "Сезон создан" }

  /admin/seasons/{season_id}/episodes:
    post:
      tags: [Admin (Projects)]
      summary: Создать эпизод для сезона
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: season_id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                episode_number: { type: integer }
                title: { type: string }
                video_url: { type: string }
      responses:
        '200': { description: "Эпизод создан" }